<body>
    <h1>Switch Statement</h1>

    <button class="btn btn-info" onclick = "teamRank()">Rank</button>
    <script>
        function teamRank(){
        var rank = "1st";

        switch(true){
            case (rank === "1st"): //compare
                message: "Champions!";
                break;
            case (rank === "2nd"): //compare
                message: "2nd Placer!";
                break;
            case (rank === "3rd"): //compare
                message: "3rd Placer!";;
                break;
            case (rank === "4th"): //compare
                message: "4th Placer!";;
                break;
        }
    }

        Let team = "Yellow"; //string

        switch(team){

               // alert("Go Yellow Tigers is the better team");

            case "Red";
                message: "Go Red Bulldogs";
                break;
             case "Green";
                message: "Go Green Hornets bzzt bzzt";
                break;
    
        }
    </script>
