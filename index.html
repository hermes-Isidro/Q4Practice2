<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Switch Statement</h1>

    <script>
        Let team = "Yellow"; //string

        switch(team){
            case "Yellow";
                alert("Go Yellow Tigers is the better team");
                break;
             case "Blue";
                alert("Go Blue Bears boooo");
                break;
            case "Red";
                alert("Go Red Bulldogs  woof woof");
                break;
             case "Green";
                alert("Go Green Hornets bzzt bzzt");
                break;
            default:
                alert(Team could not be determined)
        }
    </script>
</body>
</html>
